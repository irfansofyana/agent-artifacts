<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Artifacts</title>
    <meta
      name="description"
      content="Published final artifacts generated by AI agents for Irfan."
    >
    <link rel="stylesheet" href="assets/site.css">
  </head>
  <body>
    <main class="shell">
      <section class="masthead" aria-labelledby="page-title">
        <p class="eyebrow">Irfan Sofyana Putra</p>
        <h1 id="page-title">Agent Artifacts</h1>
        <p class="lede">
          Final HTML outputs from AI sessions, published cleanly after the work
          is done.
        </p>
      </section>

      <section class="panel" aria-labelledby="artifact-list-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Registry</p>
            <h2 id="artifact-list-title">Published Artifacts</h2>
          </div>
          <span id="artifact-count" class="count">Loading</span>
        </div>

        <div id="artifact-list" class="artifact-grid" aria-live="polite">
          <p class="muted">Loading artifacts...</p>
        </div>
      </section>
    </main>

    <script>
      const list = document.querySelector("#artifact-list");
      const count = document.querySelector("#artifact-count");

      function renderArtifacts(artifacts) {
        count.textContent = `${artifacts.length} item${artifacts.length === 1 ? "" : "s"}`;

        if (!artifacts.length) {
          list.innerHTML = '<p class="muted">No artifacts published yet.</p>';
          return;
        }

        list.innerHTML = artifacts
          .map((artifact) => {
            const title = escapeHtml(artifact.title);
            const description = escapeHtml(artifact.description);
            const createdAt = escapeHtml(artifact.createdAt);
            const type = escapeHtml(artifact.type);
            const url = escapeAttribute(artifact.url);

            return `
              <article class="artifact-card">
                <div>
                  <p class="artifact-meta">${createdAt} / ${type}</p>
                  <h3>${title}</h3>
                  <p>${description}</p>
                </div>
                <a href="${url}" aria-label="Open ${title}">Open</a>
              </article>
            `;
          })
          .join("");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replace(/`/g, "&#096;");
      }

      fetch("artifacts.json", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Unable to load artifacts.json: ${response.status}`);
          }
          return response.json();
        })
        .then((data) => renderArtifacts(data.artifacts ?? []))
        .catch((error) => {
          count.textContent = "Error";
          list.innerHTML = `<p class="muted">${escapeHtml(error.message)}</p>`;
        });
    </script>
  </body>
</html>
